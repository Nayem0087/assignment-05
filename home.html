<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- Add daisyUI & TailwindCSS -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Add Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- Add CSS file  -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- header section -->
    <header class="py-5 px-4 shadow-md rounded-md">
        <div class="max-w-[95%] mx-auto md:flex justify-between">
            <div class="flex justify-center gap-2 pb-5">
                <img class="h-[36px] w-auto" src="assets/github-logo.png" alt="">
                <h3 class="font-semibold text-2xl">GitHub Issues Tracker</h3>
            </div>
            <div class="join gap-4 flex justify-center">
                <div>
                    <label class="input validator join-item">
                        <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                            stroke="currentColor">
                            <rect width="20" height="16" x="2" y="4" rx="2"></rect>
                            <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path>
                        </g>
                        </svg>
                        <i class="fa-brands fa-sistrix"></i>
                        <input id="searchInput" class="border-none focus:outline-none focus:ring-0" type="text"
                            placeholder="search issues" required />
                    </label>
                    <div class="validator-hint hidden">This issue is not here.</div>
                </div>
                <button id="searchBtn" class="btn btn-primary join-item rounded-md">Search</button>
            </div>
        </div>

    </header>
    <!-- main section -->
    <main class="">
        <section class="max-w-[90%] mx-auto">
            <!-- btn toggling -->
            <div class="flex gap-5 py-10">
                <button id="allBtn" class="btn   btn-primary join-item px-10">All</button>
                <button id="openBtn" class="btn px-8">Open</button>
                <button id="closedBtn" class="btn px-8">Closed</button>
            </div>
            <!-- issues counter -->
            <div class="flex justify-between shadow-[0_0_10px_rgba(0,0,0,0.2)] md:px-4 px-2 py-6 rounded-sm">
                <div class="flex items-center gap-2">
                    <div>
                        <img class="bg-[#ECE4FF] rounded-full px-2 py-2" src="assets/Aperture.png" alt="Aperture image">
                    </div>
                    <div>
                        <h2 id="issuesCount" class="font-semibold text-[20px]">50 Issues</h2>
                        <p class="text-[#64748B]">Track and manage your project issues</p>
                    </div>
                </div>
                <div class="md:flex gap-5">
                    <div class="flex items-center gap-2">
                        <p class="bg-[#00A96E] rounded-full px-1 py-1"></p>
                        <p class="font-medium">Open</p>
                    </div>
                    <div class="flex items-center gap-2">
                        <p class="bg-[#A855F7] rounded-full px-1 py-1"></p>
                        <p class="font-medium">Closed</p>
                    </div>
                </div>
            </div>
            <!-- card section -->
            <div id="card-container" class="grid lg:grid-cols-4 md:grid-cols-3 sm:grid-cols-2 grid-cols-1 gap-3 py-6 shadow-[0_0_10px_rgba(0,0,0,0.2)] rounded-lg px-5 mb-10">
                <!-- dynamic card loading here -->

            </div>

            <!-- loading spinner -->
                <div id="loadingSpinner" class="h-[60vh] flex hidden justify-center items-center">
                     <span class="loading loading-spinner loading-xl"></span>
                </div>
        </section>
    </main>
