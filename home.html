<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- Add daisyUI & TailwindCSS -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Add Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- font awesome -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- Add CSS file  -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="max-w-[95%] mx-auto py-10 flex justify-between">
        <div class="flex justify-center gap-2">
            <img class="h-[36px] w-auto" src="assets/github-logo.png" alt="">
            <h3 class="font-semibold text-2xl">GitHub Issues Tracker</h3>
        </div>
        <div>
            <div class="join gap-4">
                <div>
                    <label class="input validator join-item">
                        <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                                stroke="currentColor">
                                <rect width="20" height="16" x="2" y="4" rx="2"></rect>
                                <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path>
                            </g>
                        </svg>
                        <i class="fa-brands fa-sistrix"></i>
                        <input class="border-none focus:outline-none focus:ring-0" type="text" placeholder="search issues" required />
                    </label>
                    <div class="validator-hint hidden">This issue is not here.</div>
                </div>
                <button class="btn btn-primary join-item rounded-md"><i class="fa-solid fa-plus"></i>New Issue</button>
            </div>
        </div>
    </header>
</body>

</html>
